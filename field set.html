<doctype html>
    <head>
        <title>forms in html</title>
    </head>
    <body>
        <form>
            <fieldset> 
                <legend> pesonal information</legend>
            <label>NAME:</label><br>
            <input type="text" id="NAME"> <br> <br>
            <label>email</label><br>
            <input type="text" id="email"> <br> <br>
            <label>contact number (it'll be hidden)</label><br>
            <input type="password" id="contact number"> <br> <br>
            <LABEL>gender</LABEL><br>
            <input type="radio" id="Female" name="gender" value="female">female<br>
            <input type="radio" id="male" name="gender" value="male">male<br>
            <label> pick the field set you're in (pick as many that apply to you) </label><br>
            <input type="checkbox" id="field set" value="Engineering">Engineering<br>
            <input type="checkbox" id="field set" value="medical">medical<br>
            <input type="checkbox" id="field set" value="law">law<br>
            <input type="checkbox" id="field set" value="Food">food<br>
            <input type="checkbox" id="field set" value="computer engineering">computer engineering<br>
            <input type="checkbox" id="field set" value="other">other<br>
            <input type="submit">
        </fieldset>
    </form>
    </body>
</doctype>
